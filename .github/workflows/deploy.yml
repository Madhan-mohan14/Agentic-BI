name: Deploy to Agent Runtime

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install agents-cli
        run: pip install google-agents-cli

      - name: Deploy to Agent Runtime
        env:
          RAG_CORPUS_ID: ${{ secrets.RAG_CORPUS_ID }}
          PYTHONUTF8: "1"
        run: |
          python deploy_agent_runtime.py \
            --mcp-url https://bi-tools-server-492257799932.us-central1.run.app/mcp \
            --audit-url https://audit-agent-service-492257799932.us-central1.run.app
